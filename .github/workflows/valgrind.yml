name: Valgrind

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  valgrind:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libssl-dev valgrind

      - name: Run unit + functional tests with Valgrind
        run: ./manage.sh valgrind
